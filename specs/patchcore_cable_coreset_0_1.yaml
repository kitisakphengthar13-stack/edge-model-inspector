name: patchcore_cable_coreset_0_1
task: anomaly_detection
framework: anomalib
checkpoint_path: "<PATH_TO_PATCHCORE_CHECKPOINT>"

checkpoint:
  kind: lightning_checkpoint
  load_mode: unsafe_trusted_local
  state_dict_key: state_dict

model:
  architecture: patchcore
  backbone: wide_resnet50_2
  layers:
    - layer2
    - layer3

conversion:
  strategy: feature_extractor_only
  target_format: onnx
  opset: 18
  reason: PatchCore-style checkpoints contain a memory bank and post-processing logic. Direct full-model TensorRT export may require a framework-specific loader or wrapper.

input:
  name: input
  shape: [1, 3, 256, 256]
  dtype: float32

output:
  names:
    - layer2
    - layer3

runtime_assets:
  memory_bank_key: model.memory_bank
  postprocess_keys:
    - post_processor._image_threshold
    - post_processor._pixel_threshold
    - post_processor.image_min
    - post_processor.image_max
    - post_processor.pixel_min
    - post_processor.pixel_max

notes:
  - This spec is for real PatchCore checkpoint inspection and planning.
  - The input shape must be verified from the original Anomalib training config.
  - Current generic export requires model.module and model.class_name, or a future Anomalib-specific loader.
  - This spec should validate and support check-checkpoint / plan-load.
  - export-onnx is expected to refuse until an Anomalib-specific loader or wrapper is implemented.
