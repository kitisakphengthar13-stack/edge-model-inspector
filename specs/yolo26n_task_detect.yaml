name: yolo26n_task_detect
task: object_detection
framework: ultralytics
checkpoint_path: D:/data_use/model/object_detection/pre_trained/yolo26n.pt

checkpoint:
  kind: checkpoint_dict
  load_mode: unsafe_trusted_local

model:
  architecture: yolo26n
  source_library: ultralytics
  task_variant: detect

conversion:
  strategy: external_exporter
  target_format: onnx
  exporter: ultralytics
  opset: 18
  reason: Ultralytics models should use the official Ultralytics exporter when available.

input:
  name: images
  shape: [1, 3, 640, 640]
  dtype: float32

output:
  names:
    - output0

artifact:
  onnx_path: artifacts/yolo26n_task_detect/yolo26n.onnx

notes:
  - This spec represents a real Ultralytics YOLO object detection export path.
  - The official Ultralytics exporter produced the ONNX artifact.
  - This toolkit validates and assesses the exported ONNX artifact rather than replacing the source exporter.
  - The observed ONNX output shape was [1, 300, 6].
  - The six values are detection-output values provided by the exported Ultralytics ONNX graph; exact downstream decoding should follow the Ultralytics export/runtime contract.
